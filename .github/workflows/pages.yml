name: Publish course supports

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-course-supports
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -R FormaPro _site/FormaPro
          cp index.html _site/index.html
          cp .nojekyll _site/.nojekyll

      - name: Publish gh-pages branch
        shell: bash
        run: |
          set -euo pipefail
          cd _site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
